<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FinancePro — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#080A0F;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}

/* BG animado */
.bg{position:fixed;inset:0;z-index:0}
.bg-circle{position:absolute;border-radius:50%;filter:blur(80px);animation:drift 12s ease-in-out infinite}
.c1{width:500px;height:500px;background:rgba(99,102,241,.12);top:-200px;left:-200px}
.c2{width:400px;height:400px;background:rgba(168,85,247,.08);bottom:-150px;right:-150px;animation-delay:-6s}
.c3{width:300px;height:300px;background:rgba(16,185,129,.06);bottom:100px;left:30%;animation-delay:-3s}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-30px)}}

/* CARD */
.card{position:relative;z-index:1;width:100%;max-width:400px;padding:2.5rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:24px;backdrop-filter:blur(20px);box-shadow:0 24px 64px rgba(0,0,0,.5)}

/* LOGO */
.logo{display:flex;align-items:center;gap:.65rem;margin-bottom:2.5rem}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#6366F1,#A855F7);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:0 0 20px rgba(99,102,241,.4)}
.logo-name{font-size:1.1rem;font-weight:700;letter-spacing:-.02em}
.logo-ver{font-size:.65rem;color:#475569;font-weight:500;letter-spacing:.05em;text-transform:uppercase;margin-top:1px}

/* HEADING */
.heading{margin-bottom:2rem}
.heading h1{font-size:1.6rem;font-weight:700;letter-spacing:-.03em;line-height:1.2;margin-bottom:.4rem}
.heading p{font-size:.85rem;color:#64748B}

/* FIELD */
.field{margin-bottom:1.1rem}
.field label{display:block;font-size:.75rem;font-weight:600;color:#94A3B8;letter-spacing:.04em;text-transform:uppercase;margin-bottom:.5rem}
.field-wrap{position:relative}
.field-wrap input{
  width:100%;padding:.8rem 1rem;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:12px;color:#F1F5F9;
  font-family:'Inter',sans-serif;font-size:.9rem;
  outline:none;transition:all .2s;
}
.field-wrap input:focus{border-color:rgba(99,102,241,.6);background:rgba(99,102,241,.06);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.field-wrap input::placeholder{color:#334155}
.eye{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);cursor:pointer;color:#475569;font-size:.9rem;user-select:none;transition:color .2s;padding:.2rem}
.eye:hover{color:#94A3B8}

/* SUBMIT */
.btn-submit{
  width:100%;padding:.85rem;margin-top:1.5rem;
  background:linear-gradient(135deg,#6366F1 0%,#4F46E5 100%);
  color:#fff;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:600;
  border:none;border-radius:12px;cursor:pointer;
  box-shadow:0 4px 20px rgba(99,102,241,.4);
  transition:all .2s;letter-spacing:.01em;
}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(99,102,241,.5)}
.btn-submit:active{transform:translateY(0)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ERROR */
.error-box{
  display:none;align-items:center;gap:.6rem;
  background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.2);
  border-radius:10px;padding:.7rem 1rem;margin-bottom:1.1rem;
  font-size:.82rem;color:#FB7185;
}
.error-box.show{display:flex}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:.75rem;margin:1.5rem 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.07)}
.divider span{font-size:.72rem;color:#334155}

/* FOOTER */
.footer{text-align:center;font-size:.82rem;color:#475569}
.footer a{color:#818CF8;font-weight:600;text-decoration:none;transition:color .2s}
.footer a:hover{color:#6366F1}

/* TOAST */
.toast-wrap{position:fixed;top:1.5rem;right:1.5rem;z-index:999;display:flex;flex-direction:column;gap:.5rem}
.toast{display:flex;align-items:center;gap:.75rem;padding:.8rem 1.1rem;background:rgba(28,31,38,.97);border:1px solid rgba(255,255,255,.1);border-radius:12px;font-size:.83rem;min-width:260px;box-shadow:0 8px 24px rgba(0,0,0,.5);animation:tin .3s ease}
@keyframes tin{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
.toast.success{border-left:3px solid #10B981}
.toast.error{border-left:3px solid #F43F5E}
</style>
</head>
<body>
<div id="toastWrap" class="toast-wrap"></div>
<div class="bg"><div class="bg-circle c1"></div><div class="bg-circle c2"></div><div class="bg-circle c3"></div></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">💰</div>
    <div><div class="logo-name">FinancePro</div><div class="logo-ver">Personal Finance</div></div>
  </div>

  <div class="heading">
    <h1>Bem-vindo de volta</h1>
    <p>Entre na sua conta para continuar</p>
  </div>

  <div class="error-box" id="errBox">⚠️ <span id="errMsg"></span></div>

  <form id="loginForm">
    <div class="field">
      <label>E-mail</label>
      <div class="field-wrap">
        <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
      </div>
    </div>
    <div class="field">
      <label>Senha</label>
      <div class="field-wrap">
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        <span class="eye" id="eyePass">👁</span>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:.75rem">
      <a href="reset-password.html" style="font-size:.78rem;color:#475569;text-decoration:none;transition:color .2s" onmouseover="this.style.color='#94A3B8'" onmouseout="this.style.color='#475569'">Esqueci minha senha</a>
    </div>
    <button type="submit" class="btn-submit" id="submitBtn">Entrar</button>
  </form>

  <div class="divider"><span>ou</span></div>
  <div class="footer">Não tem conta? <a href="register.html">Criar conta grátis</a></div>
</div>

<script src="js/core.js"></script>
<script>
if(Auth.isLogged()) window.location.href='index.html';

document.getElementById('eyePass').addEventListener('click',function(){
  var i=document.getElementById('password');
  i.type=i.type==='text'?'password':'text';
  this.textContent=i.type==='text'?'🙈':'👁';
});

document.getElementById('loginForm').addEventListener('submit',async function(e){
  e.preventDefault();
  var errBox=document.getElementById('errBox');
  errBox.classList.remove('show');
  var btn=document.getElementById('submitBtn');
  btn.disabled=true; btn.textContent='Entrando...';
  try{
    var r=await api.post('/auth/login',{
      email:document.getElementById('email').value.trim(),
      password:document.getElementById('password').value
    });
    Auth.save(r.data.token,r.data.user);
    btn.textContent='✓ Sucesso';
    setTimeout(function(){window.location.href='index.html';},500);
  }catch(e){
    document.getElementById('errMsg').textContent=e.message;
    errBox.classList.add('show');
    btn.disabled=false; btn.textContent='Entrar';
  }
});
</script>
</body>
</html>
